services:
  - type: web
    name: dynamic-media-card
    runtime: python
    plan: starter
    numInstances: 1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DB_PATH
        value: /var/data/dynamic_media_card.db
      - key: COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: X_CONSUMER_KEY
        sync: false
      - key: X_CONSUMER_SECRET
        sync: false
      - key: X_REDIRECT_URI
        sync: false
